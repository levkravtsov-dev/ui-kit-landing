<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Roam Report | Home</title>

		<link rel="stylesheet" href="styles/base/reset.css" />
		<link rel="stylesheet" href="styles/base/typography.css" />
		<link rel="stylesheet" href="styles/main.css" />
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__inner">
					<nav class="nav">
						<ul class="nav__menu">
							<li class="nav__item">
								<a href="#" class="nav__item-link nav__active">Home</a>
							</li>
							<li class="nav__item">
								<a href="#" class="nav__item-link">Articles</a>
							</li>
							<li class="nav__item">
								<a href="#" class="nav__item-link">About</a>
							</li>
						</ul>
					</nav>

					<h1 class="header__title">The Roam Report</h1>
					<div class="logo">
						<img src="images/svg/train.svg" alt="Train | Main logo" />
					</div>
					<p class="header__subtitle">
						Stories and photos of long walks, wrong turns, and everyday
						discoveries
					</p>
				</div>

				<ul class="current-location">
					<li>Currently in</li>
					<li><img src="images/svg/globe.svg" alt="globe icon" /></li>
					<li>Dallol, Ethiopia</li>
					<li><img src="images/svg/globe.svg" alt="globe icon" /></li>
					<li>14.2417°N</li>
					<li><img src="images/svg/globe.svg" alt="globe icon" /></li>
					<li>40.3169°E</li>
					<li><img src="images/svg/globe.svg" alt="globe icon" /></li>
				</ul>
			</div>
		</header>

		<main class="main">
			<section class="hero">
				<div class="container">
					<div class="article hero__article">
						<div class="article__img">
							<img src="images/white-camper.png" alt="white camper" />
						</div>
						<p class="article__subtitle">Featured article</p>
						<h2 class="article__title">
							Wild Camping Along Tasmania’s East Coast
						</h2>
					</div>
					<div class="hero_cta">
						<a href="#">Scroll for more</a>
						<img src="images/svg/arrow.svg" alt="down arrow" />
					</div>
				</div>
			</section>
		</main>

		<footer class="footer">
			<div class="container">
				<div class="footer__inner"></div>
			</div>
		</footer>
	</body>
</html>
